services:
  database:
    image: postgres:15-alpine
    container_name: hisp-ams-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: ams_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./ams_api
      dockerfile: Dockerfile
    container_name: hisp-ams-api
    volumes:
      - ./ams_api:/app
      - /app/node_modules # Anonymous volume prevents your host node_modules from overwriting the container's
      - /app/dist
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=12345
      - DB_DATABASE=ams_db
      - PORT=3000
    restart: unless-stopped
    depends_on:
      - database

  web:
    build:
      context: ./ams_web
      dockerfile: Dockerfile
    container_name: hisp-ams-web
    volumes:
      - ./ams_web:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=https://provide-prepaid-scotia-joe.trycloudflare.com
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    restart: unless-stopped

volumes:
  postgres_data:
