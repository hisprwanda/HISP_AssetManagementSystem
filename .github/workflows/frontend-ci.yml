name: HISP-AMS Frontend CI

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './ams_web/package-lock.json' 

    - name: Install Dependencies
      run: npm ci
      working-directory: ./ams_web

    - name: Run Linter
      run: npm run lint
      working-directory: ./ams_web

    - name: Verify Production Build
      run: npm run build
      working-directory: ./ams_web

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Test Docker Build
      uses: docker/build-push-action@v4
      with:
        context: ./ams_web
        file: ./ams_web/Dockerfile
        push: false
        tags: hisp-frontend-test:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max