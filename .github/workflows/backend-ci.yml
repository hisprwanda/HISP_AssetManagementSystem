name: HISP-AMS Backend CI

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './ams_api/package-lock.json'

    - name: Install Dependencies
      run: npm ci
      working-directory: ./ams_api

    - name: Run Linter (Check for messy code)
      run: npm run lint
      working-directory: ./ams_api

    - name: Run Unit Tests (Verify business logic)
      run: npm run test -- --passWithNoTests
      working-directory: ./ams_api

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Test Docker Build (Verify container works)
      uses: docker/build-push-action@v4
      with:
        context: ./ams_api
        file: ./ams_api/Dockerfile
        push: false
        tags: hisp-api-test:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max